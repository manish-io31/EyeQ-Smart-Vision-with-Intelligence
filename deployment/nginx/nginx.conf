# ─────────────────────────────────────────────────────────────
# EYEQ – Nginx Reverse Proxy Configuration
# Routes:
#   /api/*    → FastAPI backend  (port 8000)
#   /*        → Streamlit dashboard (port 8501)
# ─────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # allow video uploads

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstream Services ────────────────────────────────────
    upstream eyeq_backend {
        server backend:8000;
    }

    upstream eyeq_dashboard {
        server dashboard:8501;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name your-domain.com;   # <-- replace with your domain

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ── API Routes ───────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://eyeq_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Streamlit Dashboard ──────────────────────────────
        location / {
            proxy_pass         http://eyeq_dashboard/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400;   # keep WebSocket alive
        }

        # ── Static Alert Images ──────────────────────────────
        location /alert-images/ {
            alias /app/alert_images/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}
