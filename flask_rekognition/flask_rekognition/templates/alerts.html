{% extends "base.html" %}
{% block title %}Alerts — EyeQ{% endblock %}

{% block content %}
<div class="row mt-3 g-3">
  <div class="col-12">
    <div class="panel">

      <!-- Header + filters -->
      <div class="panel-header flex-wrap gap-2">
        <span class="d-flex align-items-center gap-2">
          <i class="bi bi-bell-fill" style="color:#ef4444;"></i>
          <span>Alert History</span>
          <span class="badge font-mono" id="totalBadge"
                style="background:rgba(239,68,68,.12);color:#ef4444;
                       border:1px solid rgba(239,68,68,.25);font-size:.65rem;">
            …
          </span>
        </span>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <div class="input-group input-group-sm" style="width:160px;">
            <span class="input-group-text" style="padding:.3rem .5rem;">
              <i class="bi bi-tag" style="font-size:.75rem;color:#06b6d4;"></i>
            </span>
            <input id="lf" type="text" class="form-control"
                   placeholder="Filter label…" style="font-size:.8rem !important;"/>
          </div>
          <div class="input-group input-group-sm" style="width:120px;">
            <span class="input-group-text" style="padding:.3rem .5rem;">
              <i class="bi bi-percent" style="font-size:.75rem;color:#06b6d4;"></i>
            </span>
            <input id="cf" type="number" min="0" max="100"
                   class="form-control" placeholder="Min conf"
                   style="font-size:.8rem !important;"/>
          </div>
          <button class="btn btn-sm" onclick="loadAlerts(1)"
                  style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);
                         color:#06b6d4;padding:.3rem .7rem;">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>

      <!-- Table -->
      <div style="overflow-x:auto;">
        <table class="table table-dark table-hover table-sm mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Object</th>
              <th>Confidence</th>
              <th>Type</th>
              <th>Camera</th>
              <th>SMS</th>
              <th>Time</th>
              {% if current_user.is_admin() %}<th></th>{% endif %}
            </tr>
          </thead>
          <tbody id="body">
            <tr>
              <td colspan="8" class="text-center py-5" style="color:#334155;">
                <span class="spinner-border spinner-border-sm me-2"
                      style="color:#06b6d4;"></span>
                <span style="font-size:.83rem;">Loading alerts…</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Footer: info + pagination -->
      <div class="panel-footer d-flex justify-content-between align-items-center py-2 px-3 flex-wrap gap-2">
        <small class="text-muted font-mono" id="info" style="font-size:.75rem;"></small>
        <div id="pages" class="d-flex gap-1 flex-wrap"></div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const isAdmin = {{ 'true' if current_user.is_admin() else 'false' }};
let curPage = 1;

async function loadAlerts(page = 1) {
  curPage = page;
  const label = document.getElementById('lf').value.trim();
  const conf  = document.getElementById('cf').value || 0;
  const url   = `/api/alerts?page=${page}&per_page=25&label=${encodeURIComponent(label)}&min_confidence=${conf}`;

  /* Loading state */
  document.getElementById('body').innerHTML = `
    <tr><td colspan="8" class="text-center py-4" style="color:#334155;">
      <span class="spinner-border spinner-border-sm me-2" style="color:#06b6d4;"></span>
      <span style="font-size:.83rem;">Loading…</span>
    </td></tr>`;

  const r = await fetch(url);
  const d = await r.json();

  const tbody = document.getElementById('body');
  const total = document.getElementById('totalBadge');
  if (total) total.textContent = d.total ?? '…';

  if (!d.alerts.length) {
    tbody.innerHTML = `
      <tr><td colspan="8" class="text-center py-5" style="color:#334155;">
        <i class="bi bi-bell-slash d-block mb-2" style="font-size:1.8rem;"></i>
        <span style="font-size:.83rem;">No alerts found</span>
      </td></tr>`;
    document.getElementById('info').textContent = '';
    document.getElementById('pages').innerHTML  = '';
    return;
  }

  tbody.innerHTML = d.alerts.map(a => {
    const timeStr = new Date(a.timestamp).toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
    const pct   = a.confidence_score.toFixed(0);
    const color = a.confidence_score >= 80 ? '#ef4444' : a.confidence_score >= 60 ? '#f59e0b' : '#64748b';
    const confBar = `
      <div class="d-flex align-items-center gap-2">
        <div style="width:52px;height:4px;background:rgba(30,41,59,.8);border-radius:2px;overflow:hidden;">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;
                      transition:width .5s ease;box-shadow:0 0 4px ${color}44;"></div>
        </div>
        <span class="font-mono" style="font-size:.75rem;color:${color};">${pct}%</span>
      </div>`;
    return `<tr style="animation:rowSlide .3s ease both;">
      <td class="font-mono" style="color:#334155;font-size:.75rem;">#${a.id}</td>
      <td><span class="badge"
               style="background:rgba(239,68,68,.15);color:#ef4444;
                      border:1px solid rgba(239,68,68,.25);font-family:'JetBrains Mono',monospace;">
        ${a.object_detected}
      </span></td>
      <td>${confBar}</td>
      <td><span class="badge"
               style="background:rgba(59,130,246,.12);color:#60a5fa;
                      border:1px solid rgba(59,130,246,.2);">
        ${a.detection_type}
      </span></td>
      <td style="color:#475569;font-size:.78rem;">${a.camera_source}</td>
      <td>${a.sms_sent
            ? '<i class="bi bi-check-circle-fill" style="color:#22c55e;"></i>'
            : '<i class="bi bi-dash-circle" style="color:#334155;"></i>'}</td>
      <td class="font-mono" style="color:#475569;font-size:.75rem;white-space:nowrap;">${timeStr}</td>
      ${isAdmin ? `<td>
        <button class="btn btn-sm py-0 px-2"
                style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
                       color:#ef4444;font-size:.75rem;"
                onclick="del(${a.id})">
          <i class="bi bi-trash"></i>
        </button>
      </td>` : ''}
    </tr>`;
  }).join('');

  document.getElementById('info').textContent =
    `Page ${d.page} of ${d.pages}  •  ${d.total} total alerts`;

  /* Pagination */
  const pDiv = document.getElementById('pages');
  pDiv.innerHTML = '';

  /* Prev button */
  if (d.page > 1) {
    const b = document.createElement('button');
    b.className = 'btn btn-sm';
    b.style.cssText = 'background:rgba(71,85,105,.2);border:1px solid rgba(71,85,105,.4);color:#94a3b8;font-size:.75rem;padding:.25rem .5rem;';
    b.innerHTML = '<i class="bi bi-chevron-left"></i>';
    b.onclick = () => loadAlerts(d.page - 1);
    pDiv.appendChild(b);
  }

  for (let p = 1; p <= Math.min(d.pages, 10); p++) {
    const b = document.createElement('button');
    b.className = 'btn btn-sm font-mono';
    b.style.cssText = p === page
      ? 'background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#ef4444;font-size:.75rem;padding:.25rem .55rem;'
      : 'background:rgba(71,85,105,.15);border:1px solid rgba(71,85,105,.3);color:#64748b;font-size:.75rem;padding:.25rem .55rem;';
    b.textContent = p;
    b.onclick = () => loadAlerts(p);
    pDiv.appendChild(b);
  }

  /* Next button */
  if (d.page < d.pages) {
    const b = document.createElement('button');
    b.className = 'btn btn-sm';
    b.style.cssText = 'background:rgba(71,85,105,.2);border:1px solid rgba(71,85,105,.4);color:#94a3b8;font-size:.75rem;padding:.25rem .5rem;';
    b.innerHTML = '<i class="bi bi-chevron-right"></i>';
    b.onclick = () => loadAlerts(d.page + 1);
    pDiv.appendChild(b);
  }
}

async function del(id) {
  if (!confirm(`Delete alert #${id}?`)) return;
  await fetch(`/api/alerts/${id}`, { method: 'DELETE' });
  loadAlerts(curPage);
}

/* Search on Enter key */
document.getElementById('lf').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadAlerts(1);
});
document.getElementById('cf').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadAlerts(1);
});

loadAlerts(1);
</script>
{% endblock %}
