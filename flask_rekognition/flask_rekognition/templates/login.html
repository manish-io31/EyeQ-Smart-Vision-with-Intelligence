<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — EyeQ</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/eyeq-logo.png') }}"/>
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/eyeq-logo.png') }}"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="login-page" style="display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;">

<!-- Animated background -->
<div class="login-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Dot grid overlay (inherited from body::before) -->

<div class="login-shell" style="width:420px;max-width:95vw;position:relative;z-index:1;">
  <div class="card login-card">
    <div class="card-body p-4 p-md-5">

      <!-- Brand -->
      <div class="text-center mb-4">
        <div class="login-logo mb-3">
          <img src="{{ url_for('static', filename='img/eyeq-logo.png') }}" alt="EyeQ" width="96" height="112" loading="eager"/>
        </div>
        <p class="login-title">EyeQ</p>
        <p style="font-size:.8rem;color:#475569;margin:4px 0 0;letter-spacing:.5px;">
          SURVEILLANCE SYSTEM
        </p>
      </div>

      <!-- Flash -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat=='danger' else cat }} py-2 mb-3"
               style="font-size:.83rem;border-radius:10px;">
            <i class="bi bi-exclamation-circle me-2"></i>{{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <!-- Tabs -->
      <ul class="nav nav-tabs nav-fill mb-4">
        <li class="nav-item">
          <button class="nav-link {% if not show_register %}active{% endif %}"
                  data-bs-toggle="tab" data-bs-target="#login">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link {% if show_register %}active{% endif %}"
                  data-bs-toggle="tab" data-bs-target="#register">
            <i class="bi bi-person-plus me-1"></i>Register
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- Login tab -->
        <div class="tab-pane fade {% if not show_register %}show active{% endif %}" id="login">
          <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person" style="color:#06b6d4;"></i>
                </span>
                <input type="text" name="username"
                       class="form-control"
                       placeholder="Username" required autofocus/>
              </div>
            </div>
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock" style="color:#06b6d4;"></i>
                </span>
                <input type="password" name="password" id="lPwd"
                       class="form-control" placeholder="Password" required/>
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('lPwd',this)"
                        style="border-color:rgba(51,65,85,.6);background:rgba(13,21,38,.8);color:#64748b;">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" name="remember_me" id="rem" checked/>
              <label class="form-check-label text-muted" for="rem"
                     style="font-size:.8rem;">Keep me signed in for 24 hours</label>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2"
                    id="loginBtn" style="font-size:.9rem !important;letter-spacing:.5px;">
              <i class="bi bi-shield-lock me-2"></i>Sign In
            </button>
          </form>

          <!-- Default credentials hint -->
          <div class="mt-3 p-2 rounded d-flex align-items-center gap-2"
               style="background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15);font-size:.78rem;">
            <i class="bi bi-info-circle text-info flex-shrink-0"></i>
            <span class="text-muted">Default: <strong style="color:#e2e8f0;">admin</strong>
              / <strong style="color:#e2e8f0;">Admin@1234</strong></span>
          </div>
        </div>

        <!-- Register tab -->
        <div class="tab-pane fade {% if show_register %}show active{% endif %}" id="register">
          <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person" style="color:#06b6d4;"></i>
                </span>
                <input type="text" name="username" class="form-control"
                       placeholder="Username" required/>
              </div>
            </div>
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope" style="color:#06b6d4;"></i>
                </span>
                <input type="email" name="email" class="form-control"
                       placeholder="Email (optional)"/>
              </div>
            </div>
            <div class="mb-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock" style="color:#06b6d4;"></i>
                </span>
                <input type="password" name="password" id="rPwd"
                       class="form-control" placeholder="Password" required/>
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('rPwd',this)"
                        style="border-color:rgba(51,65,85,.6);background:rgba(13,21,38,.8);color:#64748b;">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-4">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock-fill" style="color:#06b6d4;"></i>
                </span>
                <input type="password" name="confirm_password" class="form-control"
                       placeholder="Confirm password" required/>
              </div>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2"
                    style="font-size:.9rem !important;letter-spacing:.5px;">
              <i class="bi bi-person-check me-2"></i>Create Account
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.innerHTML = inp.type === 'password'
    ? '<i class="bi bi-eye"></i>'
    : '<i class="bi bi-eye-slash"></i>';
}

/* Button loading state */
const loginForm = document.getElementById('loginForm');
const loginBtn  = document.getElementById('loginBtn');
if (loginForm) {
  loginForm.addEventListener('submit', () => {
    loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
    loginBtn.disabled  = true;
  });
}
</script>
</body>
</html>
