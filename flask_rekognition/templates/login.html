<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SurveillanceAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="bg-darkest text-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card bg-darker border-secondary shadow-lg" style="width:400px;max-width:95vw;">
  <div class="card-body p-4">
    <!-- Brand -->
    <div class="text-center mb-4">
      <i class="bi bi-camera-video-fill text-danger" style="font-size:2.5rem;"></i>
      <h5 class="fw-bold mt-2 mb-0">SurveillanceAI</h5>
      <small class="text-muted">Object Detection &amp; Alert System</small>
    </div>

    <!-- Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'danger' if cat=='danger' else cat }} py-2 small mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Tabs -->
    <ul class="nav nav-tabs nav-fill mb-3">
      <li class="nav-item">
        <button class="nav-link {% if not show_register %}active{% endif %}"
                data-bs-toggle="tab" data-bs-target="#login">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link {% if show_register %}active{% endif %}"
                data-bs-toggle="tab" data-bs-target="#register">
          <i class="bi bi-person-plus me-1"></i>Register
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Login -->
      <div class="tab-pane fade {% if not show_register %}show active{% endif %}" id="login">
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control bg-dark text-light border-secondary"
                     placeholder="Username" required autofocus/>
            </div>
          </div>
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="lPwd"
                     class="form-control bg-dark text-light border-secondary" placeholder="Password" required/>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('lPwd',this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="remember_me" id="rem" checked/>
            <label class="form-check-label small text-muted" for="rem">Keep me logged in (24 hours)</label>
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-semibold">
            <i class="bi bi-shield-lock me-1"></i> Sign In
          </button>
        </form>
        <div class="mt-3 p-2 rounded" style="background:#1a2030;border:1px solid #334155;">
          <small class="text-muted">Default: <strong class="text-light">admin</strong> / <strong class="text-light">Admin@1234</strong></small>
        </div>
      </div>

      <!-- Register -->
      <div class="tab-pane fade {% if show_register %}show active{% endif %}" id="register">
        <form method="POST" action="{{ url_for('auth.register') }}">
          <div class="mb-2">
            <input type="text" name="username" class="form-control bg-dark text-light border-secondary"
                   placeholder="Username" required/>
          </div>
          <div class="mb-2">
            <input type="email" name="email" class="form-control bg-dark text-light border-secondary"
                   placeholder="Email (optional)"/>
          </div>
          <div class="mb-2">
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
                   placeholder="Password" required/>
          </div>
          <div class="mb-3">
            <input type="password" name="confirm_password" class="form-control bg-dark text-light border-secondary"
                   placeholder="Confirm password" required/>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-semibold">
            <i class="bi bi-person-check me-1"></i> Create Account
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.innerHTML = i.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
</script>
</body>
</html>
